<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Task 3 - Semantic Layout Challenge</title>
    <link rel="stylesheet" href="divStyle3.css">
  </head>
  <body>
    <div class="page-container">
      <header>
        <!-- TASK: Add Logo div and Heading 1 here -->
         <div class="logo">
            <p>logo image</p>
         </div>
         <h1>Heading 1</h1>
      </header>
      <nav>
        <!-- TASK: Create a list for: Home, About Us, Contact Us -->
         <ul>
          <li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Home</a></li>
          <li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">About Us</a></li>
          <li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Contact Us</a></li>
         </ul>
      </nav>
      <main class="main-content">
        <!-- TASK: Add the two content boxes (text and image) -->
         <div class="content-box">
          <h2>Heading 2</h2>
          <p>Paragraph of information text</p>
         </div>
         <div class="image-box">
          <p>Image</p>
         </div>
      </main>
      <footer>
        <ul>
          <li>Footer info 1</li>
          <li>Footer info 2</li>
          <li>Footer info 3</li>
        </ul>
        <!-- TASK: Add footer info and the social links div -->
        <div class="social-links">
          <a href = "https://x.com">Twitter</a>
        </div>
      </footer>
    </div>
  </body>
</html>
